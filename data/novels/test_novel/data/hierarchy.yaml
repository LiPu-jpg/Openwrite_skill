  - lin_yue
- id: ch_007
  title: 第七章：996与修炼
  dramatic_position: 合
  summary: 陈明找到工作和修炼的微妙平衡——早晨通勤时地铁冥想，上班低调用能力提升效率，下班后在出租屋练习控制。赵磊虽觉得陈明变了但抓不到证据，林月因团队效率提升给陈明加了绩效。结尾陈明看着手腕符文自嘲：别人觉醒是拯救世界，他的觉醒是更高效地996。
