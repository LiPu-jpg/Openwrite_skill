- id: ch_008
  title: 第八章：赵磊的直觉
  dramatic_position: 起
  summary: 赵磊决定调查陈明。他开始记录陈明的异常行为：修bug速度、眼神变化、手势等。在茶水间「偶遇」陈明自言自语（实际在练习控制术法），赵磊开始怀疑。
