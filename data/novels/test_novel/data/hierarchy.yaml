- id: ch_006
  title: 第六章：线上事故
  dramatic_position: 承
  summary: 周五深夜服务器严重故障，全组被叫回来救火。常规排查两小时无进展，林月急得拍桌子。陈明在卫生间偷偷用术法感知数据流，精准定位到故障节点。他编了个理由说是「直觉」，虽然救了火，但监控日志里留下无法解释的异常波动。
  content_focus: 周五深夜服务器严重故障，全组被叫回来救火。常规排查两小时无进展，林月急得拍桌子。陈明在卫生间偷偷用术法感知数据流，精准定位到故障节点。他编了个理由说是「直觉」，虽然救了火，但监控日志里留下无法解释的异常波动。
