- id: ch_005
  title: 第五章：术法修Bug
  dramatic_position: 起
  summary: 陈明开始偷偷利用术法能力辅助工作——用微弱感知力追踪代码逻辑，用念力在脑中同时运行多个调试线程。效率暴增但必须演得不那么明显。赵磊注意到陈明最近修bug快得离谱，在工位后偷偷观察，差点撞见陈明对着屏幕比划手势。
  content_focus: 陈明开始偷偷利用术法能力辅助工作——用微弱感知力追踪代码逻辑，用念力在脑中同时运行多个调试线程。效率暴增但必须演得不那么明显。赵磊注意到陈明最近修bug快得离谱，在工位后偷偷观察，差点撞见陈明对着屏幕比划手势。
