  - zhao_lei
  - lin_yue
- id: ch_003
  title: 第三章：会议室事故
  dramatic_position: 转
  summary: 组长林月召开项目评审会议，陈明因为紧张导致能力失控——投影仪爆火花、白板笔乱飞。混乱中陈明注意到手腕符文剧烈发光，他终于确认那不是幻觉。会后他躲进厕所检查符文，内心从震惊转为恐慌。
  content_focus: 组长林月召开项目评审会议，陈明因为紧张导致能力失控——投影仪爆火花、白板笔乱飞。混乱中陈明注意到手腕符文剧烈发光，他终于确认那不是幻觉。会后他躲进厕所检查符文，内心从震惊转为恐慌。
  word_count: 3500
  involved_characters:
  - chen_ming
  - lin_yue
  - zhao_lei
- id: ch_004
  title: 第四章：程序员的逻辑
  dramatic_position: 合
  summary: 陈明用程序员的思维方式分析能力规律——记录触发条件、建立电子表格、尝试复现。他发现能力与情绪波动和「逻辑链思维」有关：越是像写代码一样清晰构建步骤，能力就越可控。他在出租屋成功用意念把可乐罐悬浮了十秒，既兴奋又害怕，决定先隐瞒这件事。
  content_focus: 陈明用程序员的思维方式分析能力规律——记录触发条件、建立电子表格、尝试复现。他发现能力与情绪波动和「逻辑链思维」有关：越是像写代码一样清晰构建步骤，能力就越可控。他在出租屋成功用意念把可乐罐悬浮了十秒，既兴奋又害怕，决定先隐瞒这件事。
