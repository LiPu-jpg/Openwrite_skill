chapters:
- id: ch_001
  title: 第一章：加班
  dramatic_position: 起
  summary: 程序员陈明在深夜加班赶项目，电脑蓝屏后烦躁拍键盘，指尖闪过淡蓝色光电脑自动恢复，手腕内侧浮现若隐若现的符文印记。
  content_focus: 程序员陈明在深夜加班赶项目，电脑蓝屏后烦躁拍键盘，指尖闪过淡蓝色光电脑自动恢复，手腕内侧浮现若隐若现的符文印记。
  word_count: 4000
  involved_characters:
  - chen_ming
  - zhao_lei
- id: ch_002
  title: 第二章：精力充沛的早晨
  dramatic_position: 承
  summary: 第二天陈明精神状态异常好，连续熬夜却毫无疲态。同事赵磊调侃他是不是偷偷吃了什么保健品。午休时陈明去茶水间倒咖啡，马克杯脱手的瞬间在空中悬浮了一秒才落下，赵磊恰好没看到。陈明开始觉得不对劲。
  content_focus: 第二天陈明精神状态异常好，连续熬夜却毫无疲态。同事赵磊调侃他是不是偷偷吃了什么保健品。午休时陈明去茶水间倒咖啡，马克杯脱手的瞬间在空中悬浮了一秒才落下，赵磊恰好没看到。陈明开始觉得不对劲。
  word_count: 3500
