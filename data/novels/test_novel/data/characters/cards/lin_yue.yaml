id: lin_yue
name: 林月
tier: 重要配角
age: 32
occupation: 技术组长
identity: 技术组长
brief: 高冷强势的技术组长，外冷内热，是最早察觉陈明异常变化的关键观察者。
background: 林月是公司技术部的明星人物，本科毕业于顶尖高校计算机系，工作八年从初级开发一路晋升到技术组长。技术实力在公司内部有口皆碑，据说曾在一次线上事故中独自扛了72小时不下线，硬是把整个系统从崩溃边缘救了回来。
  她对团队的管理风格是典型的"严师出高徒"——代码审查一丝不苟，需求评审绝不放水，但同时也是最护犊子的组长。曾当面怼过产品经理不合理的加塞需求，只因为"我的人已经连续加班两周了"。
  组里的人表面上怕她，背地里都叫她"月姐"，出了事第一个想找的也是她。
personality:
- '**高冷外表，冰山脸**：组里新人第一天都会被她的气场吓到，说话简洁直接，从不寒暄'
- '**工作能力极强**：技术过硬且管理有方，是整个部门最年轻的组长，上面信任、下面服气'
- '**实则关心下属**：嘴上从不说软话，但加班会悄悄点夜宵、下属生病会调整排期，做的比说的多'
- '**原则性强，公私分明**：工作中绝不徇私，但私下对团队成员的成长很上心'
- '**观察力敏锐**：陈明觉醒后的异常表现没逃过她的眼睛，只是还没点破'
