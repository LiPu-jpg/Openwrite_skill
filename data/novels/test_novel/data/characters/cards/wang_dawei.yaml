background: 王大伟原本是从实施一线一路做上来的老牌管理者，对“救火”“审计”“内部背锅链路”极其熟悉。星辰科技扩张之后，他逐步掌握了跨组资源与交付节奏，在很多人眼里既是能打的管理层，也是最不想惹的人之一。
personality:
- 极强的结果导向，认为一切都应该为交付负责
- 熟悉组织规则，擅长用流程名义达成个人目的
- 不迷信所谓“努力”，只接受可量化结果
- 真正危险的地方在于他从不急着翻脸，而是慢慢收窄别人的活动空间
