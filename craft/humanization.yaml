# 文本人化规则（Humanization Rules）

> 去除 AI 写作痕迹，让文本更像人类作者所写。
> 
> 此文件是共享层的一部分，适用于所有作品。

---

## 一、禁用表达清单（Banned Phrases）

这些词汇/表达在 AI 生成文本中高频出现，必须避免：

### 高频 AI 词汇

| 禁用词/表达 | 替代建议 |
|------------|---------|
| 然而 | 但是、不过、可、却 |
| 不禁 | 直接描述动作或感受 |
| 缓缓 | 慢慢、逐渐、一点点 |
| 微微一笑 | 笑了笑、嘴角上扬、露出笑容 |
| 心中暗想 | 心想、琢磨着、想着 |
| 眼中闪过一丝 | 直接描述眼神变化 |
| 嘴角微微上扬 | 笑了、咧嘴笑了 |
| 深吸一口气 | 吸了口气、长出一口气 |
| 不由得 | 直接描述结果 |
| 难以置信 | 没想到、想不到、离谱 |
| 若有所思 | 想了想、琢磨着 |
| 似乎 | 好像、仿佛、像是 |
| 仿佛 | 好像、像是、如同 |
| 刹那间 | 瞬间、一下子、突然 |
| 顿时 | 一下子、立刻、马上 |
| 油然而生 | 心里生出一股... |
| 恍然大悟 | 明白了、想通了 |
| 莫名其妙 | 搞不懂、纳闷、奇怪 |

### 英文 AI 高频词（如用英文写作）

| 禁用词 | 替代建议 |
|-------|---------|
| delve | explore, examine, look into |
| tapestry | complex system, interwoven elements |
| embark | start, begin, set out |
| landscape | situation, context, environment |
| It's important to note | （直接说重点） |
| In conclusion | （自然收尾） |
| Not only... but also | both... and, ... as well as |

---

## 二、自然不完美规则（Natural Imperfections）

人类写作有自然的"不完美"，AI 生成往往过于工整。

### 允许的不完美

| 类型 | 示例 |
|------|------|
| **片段句** | "行吧。" "也好。" "算了。" |
| **重复用词** | "他就站在那里，就站在门口。" |
| **口语化表达** | "那啥，你去不去？" |
| **不完整思考** | "如果……算了，不想了。" |
| **突然转折** | "他很认真。但其实并没有。" |
| **冗余修饰** | "那个、那个……我忘了。" |

### 避免的完美

| 类型 | 问题 | 修正 |
|------|------|------|
| **工整并列** | "第一……第二……第三……" | 打散为自然叙述 |
| **完美过渡** | 每段都有"于是""然后" | 省略部分过渡 |
| **均衡段落** | 每段长度相近 | 长短参差 |
| **完整逻辑** | 每个想法都有完整解释 | 留白让读者脑补 |

---

## 三、句式变化要求（Sentence Variation）

### 长短句比例

| 句子类型 | 长度 | 目标比例 |
|---------|------|---------|
| 短句 | < 10 字 | 30-40% |
| 中句 | 10-25 字 | 40-50% |
| 长句 | > 25 字 | 15-20% |

### 开头变化

避免连续使用相同开头模式：

```
❌ 他走到门前。他敲了敲门。他等了一会儿。

✅ 他走到门前，敲了敲门。等了一会儿，没人应。
```

### 避免的模式

- 连续 3+ 句以"他/她/它"开头
- 连续 3+ 句以"然后/于是/接着"开头
- 连续 2+ 句使用"不仅……而且……"

---

## 四、情感表达规则（Emotional Expression）

### 展示而非告知（Show, Don't Tell）

```
❌ 他感到很愤怒。（告知）
✅ 他攥紧拳头，指节发白。（展示）

❌ 她很紧张。（告知）
✅ 她的手指不停地绕着衣角。（展示）
```

### 克制煽情

| 规则 | 说明 |
|------|------|
| 不堆砌形容词 | 用一个精准词代替多个模糊词 |
| 煽情后冷静转折 | 情感高潮后接一句日常 |
| 用细节传递情感 | 不直接说"很感动"，用具体动作 |

---

## 五、对话自然化（Dialogue Naturalization）

### 避免千人一面

每个角色的对话应该有区分度：

| 角色类型 | 语言特征 |
|---------|---------|
| 老人 | 口语化、省略主语、老话俗语 |
| 小孩 | 短句、重复、语气词 |
| 学者 | 书面语、从句多、术语 |
| 粗人 | 直白、俚语、句式简单 |

### 对话标签省略

两人快速对话时，省略标签：

```
"你去哪？"
"街上。"
"干嘛？"
"买东西。"
```

### 乒乓球规则

信息提供者每说 1-2 个信息点，接收者必须有反应：

```
✅ 
"今晚八点，老地方。"他看了她一眼。
"八点？"她皱眉，"和谁？"
"就我们。"

❌
"今晚八点，老地方，就我们，不见不散。"
```

---

## 六、检查清单（Checklist）

写作完成后，逐项检查：

- [ ] 无禁用表达清单中的词汇
- [ ] 短句占比 30%+
- [ ] 无连续 3 句相同开头
- [ ] 情感用展示而非告知
- [ ] 对话有区分度
- [ ] 煽情段落有冷静转折
- [ ] 有自然的"不完美"
