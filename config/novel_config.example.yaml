# 小说项目配置示例
# 文件路径: novel_config.yaml（项目根目录）
#
# 此文件由 init_project.py 自动生成，也可以手动创建/编辑。
# ContextBuilder 和 WorkflowScheduler 等工具读取此配置。

# 小说 ID（对应 data/novels/{novel_id}/ 目录名）
novel_id: my_novel

# 参考风格 ID（对应 data/reference_styles/{style_id}/）
# 留空则不使用参考风格
style_id: ""

# 当前写作进度（由工具自动更新）
current_arc: arc_001
current_chapter: ch_001

# --- 以下为可选配置 ---

# 目标风格参考作品（可选，用于风格合成）
# 可选值: 术师手册 / 谁让他修仙的 / 天启预报 / 牧者密续 / 不许没收我的人籍 / 我师兄实在太稳健了
# reference_style: 术师手册

# 章节默认字数（可选）
# default_word_count: 4000

# Token 预算上限（可选，默认 24000）
# max_tokens: 24000
